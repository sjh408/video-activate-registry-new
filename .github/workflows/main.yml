name: 打包 macOS App
on:
  push:
    branches: [ main ]
  workflow_dispatch: # 支持手动一键打包

jobs:
  build_mac:
    runs-on: macos-latest # 使用macOS系统环境
    steps:
      # 拉取仓库全部代码
      - name: 检出源码
        uses: actions/checkout@v4

      # 配置Python环境
      - name: 安装Python3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 安装打包工具 py2app（mac专属打包工具）
      - name: 安装依赖与打包工具
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          # 在这里追加你的项目第三方库，示例：pip install requests pillow

      # 生成setup.py打包配置文件
      - name: 生成打包配置
        run: |
          cat > setup.py << EOF
          from setuptools import setup
          setup(
              app=['play.py'],  # 你的启动脚本
              options={'py2app': {'argv_emulation': True}},
              setup_requires=['py2app'],
          )
          EOF

      # 编译生成 .app 程序包
      - name: 编译Mac App
        run: python setup.py py2app

      # 把打包好的.app上传为可下载产物
      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: macOS-App安装包
          path: dist/*.app
