name: 打包 macOS App
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_mac:
    runs-on: macos-latest
    steps:
      - name: 检出源码
        uses: actions/checkout@v4

      - name: 安装Python3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装全部依赖与py2app打包工具
        run: |
          python -m pip install --upgrade pip
          pip install py2app
          # 在这里补全你的所有第三方库，例：pip install py2app customtkinter pillow requests

      - name: 生成setup.py打包配置
        run: |
          cat > setup.py << EOF
          from setuptools import setup
          setup(
              app=['play.py'],
              options={
                  'py2app': {
                      'argv_emulation': True
                  }
              },
              setup_requires=['py2app'],
          )
          EOF

      - name: 编译Mac App应用
        run: python setup.py py2app

      - name: 移除系统安全隔离属性
        run: xattr -cr dist/*.app

      - name: 云端完整日志测试App
        run: |
          ./dist/*.app/Contents/MacOS/* &
          PID=$!
          sleep 8
          kill $PID || true

      - name: 上传Mac应用安装包
        uses: actions/upload-artifact@v4
        with:
          name: macOS-完整App程序包
          path: dist/*.app
